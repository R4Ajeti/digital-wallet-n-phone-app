<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta
    name="description"
    content="Kuleta Digitale, një prototip demonstrues i kuletës digjitale.">
  <meta name="theme-color" content="#4B3F8F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kuleta">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kuleta Digitale</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #pwa-update-banner {
      align-items: center;
      background: #211d35;
      border-radius: 14px;
      bottom: max(18px, env(safe-area-inset-bottom));
      box-shadow: 0 10px 30px rgba(33, 29, 53, 0.24);
      color: #fff;
      display: none;
      font-family: Arial, sans-serif;
      gap: 14px;
      left: 50%;
      max-width: min(520px, calc(100% - 32px));
      padding: 14px 16px;
      position: fixed;
      transform: translateX(-50%);
      width: max-content;
      z-index: 9999;
    }

    #pwa-update-banner button {
      background: #ff7163;
      border: 0;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 10px 13px;
    }
  </style>
</head>
<body>
  <div id="pwa-update-banner" role="status" aria-live="polite">
    <span>Një version i ri është gati.</span>
    <button id="pwa-update-button" type="button">Rifresko</button>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });

        try {
          const registration = await navigator.serviceWorker.register('sw.js');
          const banner = document.getElementById('pwa-update-banner');
          const updateButton = document.getElementById('pwa-update-button');

          const showUpdate = (worker) => {
            banner.style.display = 'flex';
            updateButton.onclick = () => {
              worker.postMessage({type: 'SKIP_WAITING'});
            };
          };

          if (registration.waiting && navigator.serviceWorker.controller) {
            showUpdate(registration.waiting);
          }

          registration.addEventListener('updatefound', () => {
            const worker = registration.installing;
            if (!worker) {
              return;
            }
            worker.addEventListener('statechange', () => {
              if (
                worker.state === 'installed' &&
                navigator.serviceWorker.controller
              ) {
                showUpdate(worker);
              }
            });
          });

          await registration.update();
        } catch (error) {
          console.warn('Service worker registration failed:', error);
        }
      });
    }
  </script>
</body>
</html>
